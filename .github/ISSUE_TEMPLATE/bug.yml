name: 🐛 Bug
description: Bug Issue Template 입니다.
title: "🐛 Bug: "
labels: ["🐛 Bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제 상황
      description: 어떤 버그(문제)가 발생했는지 설명해주세요.
      placeholder: 예) 홈 화면 버튼이 안눌리는 문제
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 버그를 재현하는 방법
      placeholder: |
        1. 앱 실행
        2. 홈 진입
        3. 버튼 클릭

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 하나요?

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷
      description: 가능하면 첨부
