name: 🚨 Critical
description: Critical Issue Template 입니다.
title: "🚨 Critical: "
labels: ["🚨 Critical"]
body:
  - type: markdown
    attributes:
      value: |
        🚨 **서비스에 영향을 주는 긴급 이슈입니다.**
        가능한 한 빠르게 대응이 필요합니다.

  - type: textarea
    id: problem
    attributes:
      label: 문제 상황
      description: 어떤 문제가 발생했나요?
      placeholder: 예) 앱 실행 시 즉시 크래시 발생
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: 사용자에게 어떤 영향을 주나요?
      placeholder: |
        - 로그인 불가
        - 데이터 손실
        - 앱 크래시
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 문제를 재현하는 방법
      placeholder: |
        1. 앱 실행
        2. 로그인 시도
        3. 크래시 발생

  - type: dropdown
    id: environment
    attributes:
      label: 발생 환경
      options:
        - Dev
        - TestFlight
        - Production
        - Local

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 에러
      description: 크래시 로그 또는 에러 메시지

  - type: textarea
    id: temporary
    attributes:
      label: 임시 대응
      description: 핫픽스 또는 우회 방법
