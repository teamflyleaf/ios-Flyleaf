name: ✨ Feature
description: Feature Issue Template 입니다.
title: "✨ Feature: "
labels: ["✨ Feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 어떤 기능인지 설명해주세요.
      placeholder: 예) 독서 기록을 추가하는 기능
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 구현해야 할 작업을 체크박스로 작성해주세요.
      value: |
        - [ ] UI 구현
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 자료
      description: 디자인, 문서, 링크 등
